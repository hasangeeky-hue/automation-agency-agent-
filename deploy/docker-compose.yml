# Content Engine on a VPS.
#   - db     : Postgres (the job blackboard + learning store)
#   - api    : FastAPI REST that n8n calls (bound to localhost only)
#   - worker : continuous drainer (advances jobs, incl. measurement-ready ones)
#
# Run from the repo ROOT:  docker compose -f deploy/docker-compose.yml up -d --build
#
# n8n reaches the API over the shared network as  http://api:8000
# (put ENGINE_URL=http://api:8000 in n8n). If your n8n is a SEPARATE compose,
# attach it to the external network 'engine-net' (see the note at the bottom).

services:
  db:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_USER: engine
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: engine
    volumes:
      - engine_db:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U engine -d engine"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks: [engine-net]

  api:
    build:
      context: ..
      dockerfile: deploy/Dockerfile
    restart: unless-stopped
    env_file: .env
    environment:
      STORE: pg
      DATABASE_URL: postgresql://engine:${POSTGRES_PASSWORD}@db:5432/engine
    depends_on:
      db:
        condition: service_healthy
    ports:
      # Bind to localhost ONLY. Do not expose 8000 to the public internet;
      # the API has no auth. n8n talks to it over the docker network.
      - "127.0.0.1:8000:8000"
    networks: [engine-net]

  worker:
    build:
      context: ..
      dockerfile: deploy/Dockerfile
    restart: unless-stopped
    env_file: .env
    environment:
      STORE: pg
      DATABASE_URL: postgresql://engine:${POSTGRES_PASSWORD}@db:5432/engine
      POLL_IDLE_SECS: "5"
    command: ["python", "main.py"]
    depends_on:
      db:
        condition: service_healthy
    networks: [engine-net]

volumes:
  engine_db:

networks:
  engine-net:
    name: engine-net

# --- Connecting an EXISTING n8n (separate compose) -------------------------
# 1) This compose already creates the external-style network 'engine-net'.
# 2) In your n8n compose, add under the n8n service:
#        networks: [engine-net]
#    and at the bottom:
#        networks:
#          engine-net:
#            external: true
# 3) Set ENGINE_URL=http://api:8000 in n8n's environment.
